<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Escolar | Cadastro</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --bg-body: #f8fafc;
            --text-main: #1e293b;
            --text-light: #64748b;
            --white: #ffffff;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding-top: 80px; /* Espaço para o menu fixo */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- MENU ESTILIZADO --- */
        .menu {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            z-index: 1000;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .menu-esquerda { font-weight: 800; font-size: 1.2rem; color: var(--primary); }
        
        .menu-centro { display: flex; gap: 25px; }
        
        .menu-centro span {
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            color: #cbd5e1;
        }

        .menu-centro span:hover { color: var(--primary); }

        .menu-direita span {
            background: var(--primary);
            padding: 8px 20px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-weight: 600;
        }

        .menu-direita span:hover { background: var(--primary-dark); }

        /* --- CONTAINER PRINCIPAL --- */
        .container {
            width: 90%;
            max-width: 700px;
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
            margin-bottom: 50px;
        }

        .titulo {
            text-align: center;
            margin-bottom: 40px;
        }

        .titulo h1 {
            color: var(--text-main);
            font-size: 2rem;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .titulo p { color: var(--text-light); margin: 0; }

        fieldset {
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        legend {
            padding: 0 15px;
            font-weight: 700;
            color: var(--primary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        input[type="text"],
        input[type="date"],
        input[type="email"] {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            background: #e1e6eb;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            background: rgb(221, 226, 230);
        }

        .genero-container {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            background: #cbd0d4;
            padding: 15px;
            border-radius: 8px;
        }

        .genero-container label {
            display: flex;
            align-items: center;
            margin-bottom: 0;
            cursor: pointer;
            font-weight: normal;
        }

        .genero-container input { margin-right: 8px; width: 18px; height: 18px; }

        button.cadastrar {
            background-color: var(--primary);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.3);
        }

        button.cadastrar:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px rgba(59, 130, 246, 0.4);
        }

        /* --- RESULTADO (FICHA) --- */
        .resultado {
            margin-top: 20px;
            display: none;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 700px;
            animation: fadeIn 0.5s ease-out;
            margin-bottom: 80px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .menu-centro { display: none; } /* Esconde links no mobile para simplificar */
            .container { padding: 20px; }
            .flex-mobile { flex-direction: column; gap: 0 !important; }
        }
    </style>
</head>
<body>

    <nav class="menu">
        <div class="menu-esquerda">DOM JAIME</div>
        <div class="menu-centro">
            <span>Início</span>
            <span>Alunos</span>
            <span>Professores</span>
            <span>Secretaria</span>
        </div>
        <div class="menu-direita">
            <span>Login</span>
        </div>
    </nav>

    <div class="container">
        <div class="titulo">
            <h1>Matrícula Online</h1>
            <p>Preencha os dados abaixo com atenção</p>
        </div>

        <form id="meuForm">
            <fieldset>
                <legend>Identificação do Aluno</legend>
                
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" placeholder="Ex: João Silva Sauro" required>

                <label>Gênero</label>
                <div class="genero-container">
                    <label><input type="radio" name="genero" value="Masculino"> Masc.</label>
                    <label><input type="radio" name="genero" value="Feminino"> Fem.</label>
                    <label><input type="radio" name="genero" value="Outro"> Outro</label>
                </div>

                <div style="display: flex; gap: 20px;" class="flex-mobile">
                    <div style="flex: 1;">
                        <label for="dataNesc">Data de Nascimento</label>
                        <input type="date" id="dataNesc">
                    </div>
                    <div style="flex: 1;">
                        <label for="cpf">CPF do Aluno</label>
                        <input type="text" class="input-cpf" id="cpf" placeholder="000.000.000-00" maxlength="14">
                    </div>
                </div>

                <label for="email">E-mail para Contato</label>
                <input type="email" id="email" placeholder="contato@familia.com">
            </fieldset>

            <fieldset>
                <legend>Responsáveis Legais</legend>
                
                <label for="nomePai">Nome do Responsável 1</label>
                <input type="text" id="nomePai" placeholder="Nome completo">
                
                <label for="cpfPai">CPF Responsável 1</label>
                <input type="text" class="input-cpf" id="cpfPai" placeholder="000.000.000-00" maxlength="14">

                <hr style="margin: 25px 0; border: 0; border-top: 1px dashed var(--border);">

                <label for="nomeMae">Nome do Responsável 2</label>
                <input type="text" id="nomeMae" placeholder="Nome completo">
                
                <label for="cpfMae">CPF Responsável 2</label>
                <input type="text" class="input-cpf" id="cpfMae" placeholder="000.000.000-00" maxlength="14">
            </fieldset>

            <button type="button" class="cadastrar" onclick="mostrarDados()">Gerar Ficha de Matrícula</button>
        </form>
    </div>

    <div id="resultado" class="resultado"></div>

    <script>
        // Máscara de CPF
        document.querySelectorAll('.input-cpf').forEach(input => {
            input.addEventListener('input', function (e) {
                let value = e.target.value.replace(/\D/g, '');
                if (value.length > 11) value = value.slice(0, 11);
                value = value.replace(/(\d{3})(\d)/, '$1.$2');
                value = value.replace(/(\d{3})(\d)/, '$1.$2');
                value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
                e.target.value = value;
            });
        });

        function mostrarDados() {
            const nome = document.getElementById("nome").value;
            if (!nome) {
                alert("Por favor, informe ao menos o nome do aluno.");
                return;
            }

            const dataNesc = document.getElementById("dataNesc").value;
            const cpf = document.getElementById("cpf").value;
            const email = document.getElementById("email").value;
            const nomePai = document.getElementById("nomePai").value;
            const cpfPai = document.getElementById("cpfPai").value;
            const nomeMae = document.getElementById("nomeMae").value;
            const cpfMae = document.getElementById("cpfMae").value;
            const genero = document.querySelector('input[name="genero"]:checked')?.value || "Não informado";

            const divResultado = document.getElementById("resultado");
            divResultado.style.display = "block";
            divResultado.style.backgroundColor = "#1e293b";
            divResultado.style.color = "#f8fafc";

            const dataFormatada = dataNesc ? dataNesc.split('-').reverse().join('/') : "---";

            divResultado.innerHTML = `
                <div style="text-align:center; margin-bottom: 20px;">
                    <h2 style="margin:0; color: #3b82f6;">✓ Matrícula Gerada</h2>
                    <p style="font-size: 0.9rem; opacity: 0.8;">EEB Dom Jaime de Barros Câmara</p>
                </div>
                <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px;">
                    <p><strong>Aluno:</strong> ${nome}</p>
                    <p><strong>CPF:</strong> ${cpf || "---"} | <strong>Nasc:</strong> ${dataFormatada}</p>
                    <p><strong>Gênero:</strong> ${genero} | <strong>E-mail:</strong> ${email || "---"}</p>
                    <hr style="border:0; border-top: 1px solid rgba(255,255,255,0.1); margin: 15px 0;">
                    <p style="margin-bottom: 5px;"><strong>Responsável 1:</strong> ${nomePai || "---"} (${cpfPai || "N/A"})</p>
                    <p><strong>Responsável 2:</strong> ${nomeMae || "---"} (${cpfMae || "N/A"})</p>
                </div>
                <button onclick="window.print()" style="margin-top: 20px; background: none; border: 1px solid #3b82f6; color: #3b82f6; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%;">Imprimir Ficha</button>
            `;
            
            divResultado.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
